name: .NET

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    branches: [ "main" ]

env:
  VERSION: "1.0.${{ github.run_number }}"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup SQL Server (choco)
      shell: pwsh
      run: |
          choco install sql-server-express --no-progress

    - name: Setup PostgreSQL (choco)
      shell: pwsh
      run: |
          choco install postgresql13 --no-progress --params '/Password:root'

    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release "-p:Version=${{ env.VERSION }}" "-p:PackageVersion=${{ env.VERSION }}"

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Push to nuget.org
      run: dotnet nuget push "**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

    - name: Tag commit with version
      run: |
        git tag "v${{ env.VERSION }}"
        git push origin "v${{ env.VERSION }}"
